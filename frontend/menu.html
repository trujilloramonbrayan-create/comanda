<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Menú digital" id="meta-desc" />
  <meta name="theme-color" content="#1a0f0a" />
  <title>Menú</title>
  <link rel="stylesheet" href="css/menu.css" />
</head>
<body>

<!-- Toast de resultado de pago MP — visible si hay ?pago=ok/error en la URL -->
<div class="toast-pago oculto" id="toast-pago"></div>

<div class="pagina">

  <!-- ═══════════════════════════════
       ESTADOS: cargando / error / vacío
  ════════════════════════════════════ -->

  <!-- Visible por defecto hasta que el fetch responda -->
  <div class="estado-pantalla" id="estado-cargando">
    <div class="spinner"></div>
    <p>Cargando menú…</p>
  </div>

  <!-- Se muestra en caso de 404, error de red o menú vacío -->
  <div class="estado-pantalla oculto" id="estado-mensaje">
    <p class="estado-titulo"    id="estado-titulo"></p>
    <p class="estado-subtitulo" id="estado-subtitulo"></p>
  </div>

  <!-- ═══════════════════════════════
       CONTENIDO REAL — oculto hasta que el fetch tenga éxito
  ════════════════════════════════════ -->

  <header class="hero oculto" id="seccion-hero">
    <div class="columna hero-contenido">
      <!-- Iniciales del restaurante — JS las llena -->
      <div class="restaurante-logo" id="restaurante-logo"></div>
      <h1 class="restaurante-nombre" id="restaurante-nombre"></h1>
      <p class="restaurante-subtitulo">Menú digital</p>
      <div class="hero-meta">
        <span class="badge-abierto">Abierto</span>
        <span class="badge-mesa oculto" id="badge-mesa"></span>
      </div>
    </div>
  </header>

  <!-- Tabs de categorías — JS los genera dinámicamente -->
  <nav class="categorias-nav oculto" id="nav-cat">
    <div class="categorias-scroll" id="contenedor-tabs"></div>
  </nav>

  <!-- Secciones del menú — JS las genera dinámicamente -->
  <main class="menu-body columna oculto" id="menu-body"></main>

  <footer class="pie oculto" id="seccion-pie">
    Los precios incluyen IVA<br>
    <a href="https://clik.work">Powered by clik</a>
  </footer>

</div><!-- /pagina -->

<!-- Barra inferior del carrito — aparece cuando hay ítems en el carrito -->
<div class="carrito-bar oculto" id="carrito-bar">
  <button class="carrito-bar-btn" id="btn-abrir-carrito" type="button">
    <span class="carrito-cant-badge" id="carrito-cant">0</span>
    <span class="carrito-bar-label">Ver pedido</span>
    <span id="carrito-bar-total">$0</span>
  </button>
</div>

<!-- Drawer del carrito -->
<div class="carrito-overlay oculto" id="carrito-overlay">
  <div class="carrito-drawer" id="carrito-drawer">

    <div class="carrito-head">
      <button class="carrito-cerrar" id="btn-cerrar-carrito" type="button">✕</button>
      <h3>Tu pedido</h3>
      <div></div><!-- spacer para centrar el título -->
    </div>

    <!-- Número de mesa — campo principal antes de confirmar -->
    <div class="carrito-mesa-bloque" id="carrito-mesa-bloque">
      <label class="carrito-mesa-lbl" for="carrito-input-mesa">¿En qué mesa estás?</label>
      <input
        type="number"
        id="carrito-input-mesa"
        class="carrito-input-mesa"
        placeholder="Número de mesa"
        min="1"
        max="9999"
        inputmode="numeric"
      />
    </div>

    <!-- Lista de ítems -->
    <div class="carrito-items" id="carrito-items"></div>

    <!-- Total + método de pago + botón -->
    <div class="carrito-foot">
      <div class="carrito-total-row">
        <span>Total</span>
        <strong id="carrito-total-drawer">$0</strong>
      </div>

      <!-- Selector de método de pago — generado por JS según config del restaurante -->
      <div class="carrito-pago oculto" id="carrito-pago">
        <p class="carrito-pago-lbl">¿Cómo querés pagar?</p>
        <div class="carrito-pago-opciones" id="carrito-pago-opciones"></div>
      </div>

      <button class="btn-confirmar-pedido" id="btn-confirmar-pedido" type="button">
        Confirmar pedido
      </button>
      <p class="carrito-error oculto" id="carrito-error"></p>
    </div>

  </div>
</div>

<script src="js/menu.js"></script>
</body>
</html>
